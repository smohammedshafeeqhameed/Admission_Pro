{% extends 'admission_system/college_base.html' %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center p-6">
    <div
        class="max-w-md w-full bg-white dark:bg-slate-900 p-12 rounded-[3rem] shadow-3xl text-center border border-red-100 dark:border-red-900/20">
        <div
            class="w-20 h-20 bg-red-100 dark:bg-red-900/30 text-red-500 rounded-3xl flex items-center justify-center mx-auto mb-8">
            <i data-lucide="x-circle" class="w-10 h-10"></i>
        </div>
        <h1 class="text-3xl font-black mb-4">Payment Failed</h1>
        <p class="text-slate-500 dark:text-slate-400 font-medium mb-8 text-center text-sm leading-relaxed">
            We couldn't process your transaction. <br>
            <span class="text-red-500 font-bold">{{ error }}</span>
        </p>

        <div class="space-y-4">
            <button onclick="window.history.back()"
                class="w-full py-4 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 font-black rounded-xl hover:opacity-90 transition-all">
                Try Again
            </button>
            <a href="{% url 'home' %}"
                class="block w-full py-4 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 font-black rounded-xl hover:opacity-90 transition-all">
                Cancel
            </a>
        </div>
    </div>
</div>
{% endblock %}
