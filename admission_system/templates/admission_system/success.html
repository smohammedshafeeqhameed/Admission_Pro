{% extends 'admission_system/college_base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div
        class="max-w-md w-full bg-white dark:bg-slate-900 p-10 rounded-[2.5rem] shadow-3xl text-center border border-slate-100 dark:border-slate-800">
        <div
            class="w-24 h-24 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-8 animate-bounce">
            <i data-lucide="check-circle" class="w-12 h-12"></i>
        </div>
        <h1 class="text-3xl font-black mb-4">Application Success!</h1>
        <p class="text-slate-500 dark:text-slate-400 font-medium mb-8">Your admission request for <strong>{{
                app.course.name }}</strong> at <strong>{{ college.name }}</strong> has been received and payment is
            verified.</p>

        <div class="bg-slate-50 dark:bg-slate-800/50 p-6 rounded-2xl mb-8 text-left space-y-3">
            <div class="flex justify-between text-xs font-bold uppercase tracking-widest text-slate-400">
                <span>Payment ID</span>
                <span class="text-slate-900 dark:text-white">{{ app.razorpay_payment_id }}</span>
            </div>
            <div class="flex justify-between text-xs font-bold uppercase tracking-widest text-slate-400">
                <span>Amount Paid</span>
                <span class="text-slate-900 dark:text-white">₹1,500.00</span>
            </div>
        </div>

        <a href="{% url 'home' %}"
            class="block w-full py-4 bg-primary text-white font-black rounded-xl hover:opacity-90 shadow-xl shadow-primary/20 transition-all">
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
